{{ define "main" }}
  <article class="markdown book-article">
    <h1>{{ .Title }}</h1>
    {{ .Content }}

    <div class="friends-grid">
      {{ range .Site.Data.friends }}
        <a href="{{ .url }}" target="_blank" rel="noopener" class="friend-card">
          {{ if .avatar }}
            <img src="{{ .avatar }}" alt="{{ .name }}" class="friend-avatar" />
          {{ else }}
            <div class="friend-avatar friend-avatar-placeholder">{{ substr .name 0 1 }}</div>
          {{ end }}
          <div class="friend-info">
            <span class="friend-name">{{ .name }}</span>
            {{ if .desc }}
              <span class="friend-desc">{{ .desc }}</span>
            {{ end }}
          </div>
        </a>
      {{ end }}
    </div>
  </article>
{{ end }}
